<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Paws - Acceso</title>
    <link rel="stylesheet" href="css/style.css"> <!-- Usamos tu mismo CSS para mantener el estilo -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Estilos rápidos para que se vea bien de entrada */
        .auth-container { max-width: 400px; margin: 100px auto; padding: 20px; background: #fff; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .tab-group { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 2px solid #f4f4f4; }
        .tab-btn { border: none; background: none; padding: 10px; cursor: pointer; font-weight: bold; color: #888; }
        .tab-btn.active { color: #2ecc71; border-bottom: 2px solid #2ecc71; }
        .input-group { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .input-group input, .input-group select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .btn-principal { background: #2ecc71; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .btn-principal:hover { background: #27ae60; }
        .hidden { display: none; }
    </style>
    
</head>
<body>

    <!-- BOTÓN VOLVER -->
    <div style="position: absolute; top: 20px; right: 20px;">
        <a href="index.html" class="logout">
            <i class="fas fa-sign-out-alt"></i> Volver Inicio
        </a>
    </div>

    <div class="auth-container">
        <div class="logo-auth">
            <img src="img/leon.jpg" alt="Logo" style="width: 60px; border-radius: 50%;">
            <h2>Smart Paws</h2>
        </div>

        <div class="tab-group">
            <button class="tab-btn active" onclick="switchTab('login')">Ingresar</button>
            <button class="tab-btn" onclick="switchTab('registro')">Registrarse</button>
        </div>

        <!-- FORMULARIO DE LOGIN -->
        <div id="section-login">
            <form class="input-group">
                <input type="text" id="login-usuario" name="usuario" placeholder="Correo" required>
                <input type="password" id="login-pass" name="contrasena" placeholder="Contraseña" required>
                <select id="rol-login">
                    <option value="cliente">Soy Cliente</option>
                    <option value="veterinario">Soy Veterinario</option>
                </select>
                <button type="submit" class="btn-principal">Entrar</button>
            </form>
        </div>

        <!-- FORMULARIO DE REGISTRO -->
        <div id="section-registro" class="hidden">
            <form class="input-group" id="form-registro">
                <input type="number" id="reg-carnet" placeholder="Carnet de Identidad (PK)" required>
                <input type="text" id="reg-nombre" placeholder="Nombres" required>
                <input type="text" id="reg-apellido" placeholder="Apellidos" required>
                <input type="email" id="reg-correo" placeholder="Correo Electrónico" required>
                <input type="password" id="reg-pass" placeholder="Crear Contraseña" required>
                
                <input type="hidden" id="reg-rol" value="veterinario">
                <p style="color:#888; font-size: 0.9rem;">Registro solo para veterinarios</p>

                <!-- Campos exclusivos para Veterinario -->
                <!-- Campos exclusivos para Veterinario con IDs añadidos -->
                <!--
                <div id="campos-vet" class="hidden input-group" style="margin-top: 0;">
                    <input type="text" id="reg-matricula" placeholder="Nro. de Matrícula Profesional">
                    <input type="text" id="reg-especialidad" placeholder="Especialidad (ej. Cirugía)">
                </div>
                -->

                <button type="submit" class="btn-principal">Crear Cuenta</button>
            </form>
        </div>
    </div>

  

    <!-- Vinculamos el archivo de lógica que creamos -->
    <script src="js/auth.js"></script>
</body>

</html>
