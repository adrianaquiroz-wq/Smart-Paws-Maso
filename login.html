<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Paws — Acceso</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

  <a href="index.html" class="auth-back"><i class="fas fa-arrow-left"></i> Volver al inicio</a>

  <div class="auth-page">
    <div class="auth-wrapper">
      <div class="auth-logo">
        <img src="img/leon.jpg" alt="Smart Paws">
        <h2>Smart Paws</h2>
        <p>Veterinaria digital en La Paz</p>
      </div>

      <div class="auth-card">
        <div class="tab-group">
          <button class="tab-btn active" onclick="switchTab('login')">Ingresar</button>
          <button class="tab-btn" onclick="switchTab('registro')">Registrarse</button>
        </div>

        <!-- LOGIN -->
        <div id="section-login">
          <form class="input-group">
            <input type="text" id="login-usuario" name="usuario" placeholder="Correo electrónico" required>
            <input type="password" id="login-pass" name="contrasena" placeholder="Contraseña" required>
            <select id="rol-login">
              <option value="cliente">🐾 Soy Cliente</option>
              <option value="veterinario">🩺 Soy Veterinario</option>
            </select>
            <button type="submit" class="btn-principal">Entrar</button>
          </form>
        </div>

        <!-- REGISTRO -->
        <div id="section-registro" class="hidden">
          <form class="input-group" id="form-registro">
            <input type="number" id="reg-carnet" placeholder="Carnet de Identidad" required>
            <input type="text" id="reg-nombre" placeholder="Nombres" required>
            <input type="text" id="reg-apellido" placeholder="Apellidos" required>
            <input type="email" id="reg-correo" placeholder="Correo electrónico" required>
            <input type="password" id="reg-pass" placeholder="Crear contraseña" required>
            <input type="hidden" id="reg-rol" value="veterinario">
            <p style="font-size:.8rem;color:var(--texto-suave);text-align:center;">Registro habilitado solo para veterinarios.</p>
            <button type="submit" class="btn-principal">Crear cuenta</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
