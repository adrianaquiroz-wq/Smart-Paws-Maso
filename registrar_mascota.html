<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Paws — Registrar Mascota</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="form-page">

  <div class="form-topbar">
    <h3><i class="fas fa-paw" style="margin-right:8px;"></i>Registrar Mascota</h3>
    <a href="panel-vet.html"><i class="fas fa-arrow-left"></i> Volver al panel</a>
  </div>

  <div class="form-body">
    <div class="form-card">
      <h2>Nueva mascota</h2>
      <p class="form-subtitle">Completa la información del paciente.</p>
      <form id="form-mascota" enctype="multipart/form-data" class="field-group">

        <div class="field">
          <label>CI del dueño</label>
          <div class="ci-box">
            <input type="number" name="carnetDue" id="masc-cliente" placeholder="Ingrese el CI..." required>
            <button type="button" onclick="buscarCliente()"><i class="fas fa-search"></i> Buscar</button>
          </div>
        </div>

        <div class="field">
          <label>Nombre de la mascota</label>
          <input type="text" name="nombre" placeholder="Ej: Max" required>
        </div>

        <div class="field">
          <label>Fecha de nacimiento</label>
          <input type="date" name="fecha_nacimiento">
        </div>

        <div class="field-row">
          <div class="field">
            <label>Especie</label>
            <select id="especie" name="id_especie" onchange="cargarRazas()" required>
              <option value="">Seleccione...</option>
            </select>
          </div>
          <div class="field">
            <label>Raza</label>
            <select id="raza" name="id_raza" required>
              <option value="">Seleccione...</option>
            </select>
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label>Color</label>
            <select name="id_color">
              <option value="1">Negro</option>
              <option value="2">Blanco</option>
              <option value="3">Marrón</option>
            </select>
          </div>
          <div class="field">
            <label>Tamaño</label>
            <select name="tamano">
              <option>Pequeño</option>
              <option>Mediano</option>
              <option>Grande</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>Peso (kg)</label>
          <input type="number" name="peso" placeholder="Ej: 5.2" step="0.1">
        </div>

        <div class="field">
          <label>Descripción</label>
          <textarea name="descripcion" placeholder="Características generales..."></textarea>
        </div>

        <div class="field">
          <label>Alergias conocidas</label>
          <textarea name="alergias" placeholder="Ninguna / Detallar..."></textarea>
        </div>

        <div class="field">
          <label>Foto de la mascota</label>
          <input type="file" name="foto" accept="image/*" onchange="previewImg(event)">
          <div class="preview">
            <img id="img-preview" src="img/default.png" alt="Vista previa de la mascota">
          </div>
          <p style="font-size:0.75rem;color:var(--texto-suave);margin-top:8px;text-align:center;">
            Selecciona una imagen de la mascota (JPG, PNG, etc.)
          </p>
        </div>

        <button type="submit" class="btn-submit">
          <i class="fas fa-paw" style="margin-right:8px;"></i>Registrar mascota
        </button>
      </form>
    </div>
  </div>

  <script src="js/mascota.js"></script>
</body>
</html>
